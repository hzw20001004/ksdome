# 使用说明 V5.3
# MySQL优化版 - 62G内存/16核/113G磁盘配置
# 磁盘规划: 数据~80G + redo log 2G + undo/tmp ~3G ≈ 85G (113G可用)
# 1. 前置: mount --bind /home/mydata /mydata (利用home分区113G空间)
# 2. 使用docker-compose  宿主机不需要配置host来发现
# 3. 无需修改源码，根目录  docker-compose up 即可


services:
  sig-mysql-txg:
    image: mysql:8.0.36
    container_name: sig-mysql-txg
    restart: always
    environment:
      MYSQL_ROOT_HOST: "%"
      MYSQL_ROOT_PASSWORD: Aw123456.
      TZ: Asia/Shanghai
      SET_CONTAINER_TIMEZONE: true
      CONTAINER_TIMEZONE: Asia/Shanghai
    ports:
      - 13306:3306
    volumes:
      - "/home/txg/mysql/db:/var/lib/mysql"
      - "/home/txg/mysql/conf:/etc/mysql/conf.d"
      - "/home/txg/mysql/data:/var/lib/mysql-files"
      - "/home/txg/mysql/log:/var/log/mysql"
      - "/etc/localtime:/etc/localtime:ro"
    deploy:
      resources:
        limits:
          cpus: '12'
          memory: 40G
        reservations:
          cpus: '8'
          memory: 32G
    shm_size: '2g'
    command:
      --innodb_buffer_pool_size=28G
      --innodb_buffer_pool_instances=16
      --innodb_redo_log_capacity=2G
      --innodb_log_buffer_size=64M
      --innodb_flush_log_at_trx_commit=2
      --innodb_flush_method=O_DIRECT
      --innodb_io_capacity=2000
      --innodb_io_capacity_max=4000
      --innodb_read_io_threads=8
      --innodb_write_io_threads=8
      --innodb_thread_concurrency=0
      --innodb_open_files=4096
      --innodb_undo_log_truncate=ON
      --innodb_max_undo_log_size=1G
      --max_connections=500
      --thread_cache_size=64
      --table_open_cache=4096
      --table_definition_cache=2048
      --sort_buffer_size=4M
      --join_buffer_size=4M
      --read_buffer_size=2M
      --read_rnd_buffer_size=8M
      --tmp_table_size=256M
      --max_heap_table_size=256M
      --key_buffer_size=256M
      --max_allowed_packet=256M
      --host_cache_size=0
      --slow_query_log=1
      --long_query_time=2
      --skip-log-bin
      --log-bin=mysql-bin
      --server-id=2
      --replicate-do-db=jielong
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci





















