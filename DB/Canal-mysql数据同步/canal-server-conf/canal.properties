# ============================================================================
# Canal-Server 全局配置 (独立模式, 不依赖 Canal-Admin)
# 参考: https://github.com/alibaba/canal/wiki/adminguide
# ============================================================================

# --- 基础标识 ---
canal.id = 1
canal.ip =
canal.register.ip =
canal.port = 11111
canal.metrics.pull.port = 11112
# 必填! 不配会导致 CanalStarter.start() 第 68 行 NPE
canal.serverMode = tcp

# 必填! 不配会导致 CanalController.initInstanceConfig 第 396 行 NPE
# (即使 auto.scan=true 也必须显式列出 destinations)
canal.destinations = jielong

# --- ZooKeeper (单机模式留空) ---
canal.zkServers =
canal.zookeeper.flush.period = 1000
canal.withoutNetty = false

# --- 实例扫描 (关闭! 否则会扫描镜像自带的 conf/example/ 实例报错) ---
# canal.destinations 已显式列出实例, 不需要扫描器自动发现
canal.auto.scan = false
canal.auto.scan.interval = 5

# --- 全局实例加载方式 (spring + file-instance.xml) ---
canal.instance.global.mode = spring
canal.instance.global.lazy = false
canal.instance.global.spring.xml = classpath:spring/file-instance.xml
canal.instance.global.register.with.example = true

# --- MQ 模式 (tcp 模式不用, 但保留避免 NPE) ---
canal.mq.dynamicTopic = false
canal.mq.parallelThreadSize = 0
canal.mq.retries = 0
